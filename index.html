<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GLB Viewer</title>
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; background: #111; }
    #ui {
      position: fixed; left: 12px; top: 12px; z-index: 10;
      color: #eee; font: 13px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: rgba(0,0,0,.55); padding: 10px 12px; border-radius: 10px;
      max-width: min(520px, calc(100vw - 24px));
      backdrop-filter: blur(6px);
    }
    #bar {
      height: 6px; background: rgba(255,255,255,.15); border-radius: 999px; overflow: hidden; margin-top: 8px;
    }
    #bar > div { height: 100%; width: 0%; background: rgba(255,255,255,.85); }
    #hint { opacity: .85; margin-top: 8px; }
    canvas { display:block; }
  </style>

  <!-- three.js をビルド無しで使う（importmap + CDN） -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="ui">
    <div id="status">Loading: 0%</div>
    <div id="bar"><div id="barFill"></div></div>
    <div id="hint">
      操作: 左ドラッグ=回転 / 右ドラッグ(or Shift+左)=パン / ホイール=ズーム
    </div>
    <div id="error" style="display:none; color:#ffb4b4; margin-top:8px;"></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const statusEl = document.getElementById('status');
    const barFill = document.getElementById('barFill');
    const errorEl  = document.getElementById('error');

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 10000);
    camera.position.set(2, 1.5, 3);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    // ライト（シンプルだけど見やすい構成）
    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.0));
    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(5, 8, 6);
    scene.add(dir);

    // 床の薄いグリッド（邪魔なら消してOK）
    const grid = new THREE.GridHelper(10, 20, 0x444444, 0x222222);
    grid.position.y = 0;
    scene.add(grid);

    const loader = new GLTFLoader();
    const url = './zhall.glb';

    loader.load(
      url,
      (gltf) => {
        const root = gltf.scene;
        scene.add(root);

        // モデルをフレーム内に収める（自動でサイズ調整）
        const box = new THREE.Box3().setFromObject(root);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());

        // 変な位置にある場合に中央へ寄せる
        root.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z);
        const fov = camera.fov * (Math.PI / 180);
        let camZ = Math.abs(maxDim / (2 * Math.tan(fov / 2)));
        camZ *= 1.6; // 少し引く

        camera.position.set(0, Math.max(maxDim * 0.2, 0.2), camZ);
        camera.near = Math.max(camZ / 1000, 0.001);
        camera.far  = camZ * 1000;
        camera.updateProjectionMatrix();

        controls.target.set(0, 0, 0);
        controls.update();

        statusEl.textContent = 'Loaded';
        barFill.style.width = '100%';
        setTimeout(() => {
          // UI残すなら消さない。消したいならここで ui を隠す。
          // document.getElementById('ui').style.display = 'none';
        }, 400);
      },
      (xhr) => {
        if (xhr.total) {
          const pct = Math.round((xhr.loaded / xhr.total) * 100);
          statusEl.textContent = `Loading: ${pct}%`;
          barFill.style.width = `${pct}%`;
        } else {
          statusEl.textContent = `Loading: ${Math.round(xhr.loaded / 1024)} KB`;
        }
      },
      (err) => {
        console.error(err);
        statusEl.textContent = 'Failed';
        errorEl.style.display = 'block';
        errorEl.textContent =
          'GLBの読み込みに失敗しました。ファイル名/配置(./zhall.glb)とGitHub Pages設定を確認してね。';
      }
    );

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', onResize);

    renderer.setAnimationLoop(() => {
      controls.update();
      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
